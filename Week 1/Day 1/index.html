<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: cornflowerblue;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        
        .sidebar {
            width: 260px;
            background: #fff;
            padding: 20px;
            border-right: 1px solid #ddd;
        }

        .sidebar img {
            width: 100%;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .sidebar h2 {
            margin-bottom: 5px;
        }

        .role {
            color: gray;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .bio {
            font-size: 14px;
            margin-bottom: 20px;
        }

        .sidebar nav a {
            display: block;
            margin: 10px 0;
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }

       
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 30px;
        }

        
        .card {
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            border-radius: 5px;
            transition: transform 0.3s;
        }

       
        .orange {
            background: linear-gradient(to right, #ff7e5f, #ff6a00);
        }

        .dark {
            background: #1e1e2f;
        }

        .blue {
            background: linear-gradient(to right, #00c6ff, #0072ff);
        }

        .pink {
            background: linear-gradient(to right, #ff758c, #ff7eb3);
        }

        .purple {
            background: #6a5acd;
        }

        .green {
            background: linear-gradient(to right, #00c9a7, #00e4a7);
        }

        .container {
            flex-direction: column;
        }

        .sidebar {
            width: 100%;
        }

        .grid {
            grid-template-columns: 1fr;
        }
    </style>
</head>

<body>

    <div class="container">

        <aside class="sidebar">

            <h2>Adhish Tiwari</h2>
            <p class="role">Graphic Designer | Web Developer | Polymath</p>
            <p class="bio">
                I approach design with a deep appreciation for user perspectives.
                My aim is to help people and provide memorable experiences.
            </p>
            <nav>
                <a href="">WORK</a>
                <a href="">ABOUT</a>
                <a href="">CONTACT</a>
                <a href="">RESUME</a>
            </nav>
        </aside>

        <main class="grid">

            <div class="card orange">Work type</div>
            <div class="card dark">Accomplishments</div>
            <div class="card blue">Courses done</div>
            <div class="card pink">Aspirations</div>
            <div class="card purple">Hobbies</div>
            <div class="card green">Day to day life</div>

        </main>

    </div>
    </div>

</body>

</html>
