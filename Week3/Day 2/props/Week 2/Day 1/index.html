<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Simple Calculator</h1>
        <input type="number" placeholder="Number 1" id="num1">
        <br>
        <input type="number" placeholder="Number 2" id="num2">
        <br>
        <button id="addition">+</button>
        <button id="subtraction">-</button>
        <button id="multiplication">x</button>
        <button id="division">/</button>
        <br>
        <input type="number" placeholder="Result" class="result" id="answer">
    </div>
    <script src="script.js"></script>
</body>
</html>
