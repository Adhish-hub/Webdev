<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Product List</h1>

    
    <input type="text" placeholder="Search..." onkeyup="searchProduct(this.value)">

    <button onclick="sortByPrice('low')">Low to High</button>
    <button onclick="sortByPrice('high')">High to Low</button>

    <button onclick="toggleView('grid')">Grid</button>
    <button onclick="toggleView('list')">List</button>

   
    <div id="product-container"></div>

   
    <script src="script.js"></script>
</body>
</html>
