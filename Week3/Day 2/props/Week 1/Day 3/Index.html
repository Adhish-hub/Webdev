<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Layout</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            padding: 10px;
            background-color: dimgrey;
        }

        .header {
            display: flex;
            justify-content: center;
            align-content: center;
            align-items: center;
            height: 60px;
            color: cadetblue;
            background-color: chartreuse;


        }

        .main {
            display: flex;
            background-color: tomato;
            color: yellow;
            min-height: 200px;
            padding: 20px;
            justify-content:space-between;
            align-content: center;
            align-items: center;
        }

        .a,
        .b {
            min-height: 200px;
            display: flex;
            color: gold;
            background-color: cornflowerblue;
            padding: 10px;

        }



        /* .a{
            min-height: 20px;
            display: flex;
            color: gold;
            background-color: cornflowerblue;
            padding: 10px;
            position: relative;
            right: 200px;
        }
        .b{
            min-height: 20px;
            display: flex;
            color: gold;
            background-color: cornflowerblue;
            padding: 10px;
            position: relative;
            left: 200px;
        }  */

        .sidebar-left,
        .sidebar-right {
            display: flex;
            justify-content: center;
            align-content: center;
            align-items: center;
            background-color: aqua;
            color: darkgoldenrod;
            min-height: 50px;
        }

        .sidebar-too-left {
            display: flex;
            justify-content: center;
            align-content: center;
            align-items: center;
            background-color: black;
            color: aqua;
            min-height: 40px;
        }

        .sidebar-too-right {
            display: flex;
            justify-content: center;
            align-content: center;
            align-items: center;
            background-color: black;
            color: aqua;
            min-height: 40px;
        }


        @media (min-width: 768px) {
            .container {
                grid-template-columns: 200px 1fr 200px;
                grid-template-areas:
                    "header header header"
                    "left main right"
                    "footer footer footer"

            }




            .footer {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 60px;
                background-color: rgb(58, 58, 91);
                color: aliceblue;
                justify-content: center;
                align-content: center;
                align-items: center;

            }

            .header {
                grid-area: header;
            }

            .sidebar-left {
                grid-area: left;
            }

            .main {
                grid-area: main;
            }

            .sidebar-right {
                grid-area: right;
            }

            .footer {
                grid-area: footer;
            }

            /* .sidebar-too-left { grid-area: too-left; }
  .sidebar-too-right { grid-area: too-right; } */
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="header">Header (Flexbox)</header>
        <aside class="sidebar-left">Sidebar-left</aside>
        <!-- <aside class="sidebar-too-left">Too-left</aside> -->
        <main class="main">
            <div class="a">Mini-main</div>
            <dic class="center">Main</dic>
            <div class="b">Mini-main</div>
        </main>
        <aside class="sidebar-right">Sidebar-right</aside>
        <!-- <aside class="sidebar-too-right">Too-right</aside> -->
        <footer class="footer">Footer</footer>
    </div>

</body>

</html>
